.header{background:rgba(255,255,255,0.03);border-bottom:1px solid rgba(255,255,255,0.08);padding:16px 32px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:20px;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header-actions{display:flex;gap:12px;align-items:center}
.header-actions .user-name{color:#aaa;font-size:14px}
.btn{padding:8px 16px;border-radius:8px;border:none;font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s}
.btn-outline{background:transparent;border:1px solid rgba(255,255,255,0.15);color:#ccc}
.btn-outline:hover{border-color:#8b5cf6;color:#a78bfa}
.btn-accent{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.btn-accent:hover{opacity:0.9}
.btn-tab{background:transparent;border:1px solid rgba(255,255,255,0.1);color:#888;padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all 0.2s}
.btn-tab.active{background:rgba(139,92,246,0.15);border-color:#8b5cf6;color:#a78bfa}
.container{max-width:1200px;margin:0 auto;padding:24px 32px}
.tab-bar{display:flex;gap:8px;margin-bottom:24px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:32px}
.stat-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px}
.stat-card .label{font-size:12px;color:#888;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.stat-card .value{font-size:32px;font-weight:700;background:linear-gradient(135deg,#6366f1,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-card .sub{font-size:12px;color:#666;margin-top:4px}
.stat-card .improvement{color:#22c55e;font-weight:700}
.section{margin-bottom:32px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-header h2{font-size:18px;font-weight:600}
.table-wrap{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:12px;overflow-x:auto}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:12px 16px;font-size:12px;color:#888;text-transform:uppercase;letter-spacing:0.5px;border-bottom:1px solid rgba(255,255,255,0.08);font-weight:500}
td{padding:12px 16px;font-size:14px;border-bottom:1px solid rgba(255,255,255,0.04)}
tr:hover td{background:rgba(255,255,255,0.02)}
.progress-bar{width:100%;height:6px;background:rgba(255,255,255,0.08);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;transition:width 0.5s}
.fill-low{background:#ef4444}.fill-mid{background:#eab308}.fill-high{background:#22c55e}
.badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600}
.badge-green{background:rgba(34,197,94,0.15);color:#4ade80}
.badge-yellow{background:rgba(234,179,8,0.15);color:#fbbf24}
.badge-gray{background:rgba(255,255,255,0.08);color:#888}
.invite-form{display:flex;gap:8px;align-items:center}
.invite-form input{padding:8px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:14px;flex:1;max-width:300px}
.invite-form input:focus{outline:none;border-color:#8b5cf6}
.empty-state{text-align:center;padding:60px 20px;color:#666}
.empty-state h3{font-size:18px;margin-bottom:8px;color:#aaa}
.loading{text-align:center;padding:40px;color:#888}
.leaderboard-rank{font-weight:700;color:#a78bfa}
.lesson-card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:20px;margin-bottom:12px;transition:border-color 0.2s}
.lesson-card:hover{border-color:rgba(139,92,246,0.3)}
.lesson-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.lesson-card-title{font-size:15px;font-weight:700}
.lesson-card-score{font-size:24px;font-weight:800}
.lesson-card-score.high{color:#22c55e}.lesson-card-score.mid{color:#eab308}.lesson-card-score.low{color:#ef4444}
.lesson-card-meta{display:flex;gap:16px;font-size:12px;color:#888;margin-bottom:10px;flex-wrap:wrap}
.lesson-card-feedback{font-size:13px;color:#aaa;line-height:1.6;padding:10px 14px;background:rgba(255,255,255,0.03);border-radius:8px;border-left:3px solid #6366f1}
.score-change{font-size:12px;margin-left:8px}
.score-change.up{color:#22c55e}
.progress-overview{display:grid;grid-template-columns:repeat(12,1fr);gap:6px;margin-bottom:24px}
.progress-dot{height:44px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:1px solid rgba(255,255,255,0.08);transition:all 0.2s}
.progress-dot.completed{background:rgba(34,197,94,0.2);border-color:rgba(34,197,94,0.3);color:#4ade80}
.progress-dot.active{background:rgba(234,179,8,0.2);border-color:rgba(234,179,8,0.3);color:#fbbf24}
.progress-dot.empty{background:rgba(255,255,255,0.03);color:#555}
.rank-display{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.rank-emoji{font-size:28px}.rank-name{font-size:18px;font-weight:700;color:#a78bfa}
.rank-sub{font-size:12px;color:#666}
.xp-bar{width:100%;height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden;margin-top:6px;margin-bottom:4px}
.xp-fill{height:100%;background:linear-gradient(90deg,#6366f1,#22c55e);border-radius:4px;transition:width 0.8s}
.xp-label{font-size:11px;color:#666;text-align:right}
@media(max-width:768px){.stats-grid{grid-template-columns:repeat(2,1fr)}.progress-overview{grid-template-columns:repeat(6,1fr)}.container{padding:16px}.header{padding:12px 16px}}
</style>

<body>
<script>document.body.setAttribute('data-theme',localStorage.getItem('pai_theme')||'light');</script>
<div class="header">
  <h1>🎓 Prompt AI Academy — Dashboard</h1>
  <div class="header-actions">
    <span class="user-name" id="user-name"></span>
    <button class="btn btn-outline" onclick="var t=document.body.getAttribute('data-theme')==='dark'?'light':'dark';document.body.setAttribute('data-theme',t);localStorage.setItem('pai_theme',t);this.textContent=t==='dark'?'☀️ Light':'🌙 Dark'" style="font-size:12px;padding:6px 12px">🌙 Dark</button>
    <button class="btn btn-outline" onclick="window.location.href='/academy'">Training →</button>
    <button class="btn btn-outline" onclick="logout()">Sign Out</button>
  </div>
</div>
<div class="container" id="main-content"><div class="loading">Loading dashboard...</div></div>
<script>
const session=localStorage.getItem('pai_session');
const user=localStorage.getItem('pai_user');
if(!session){window.location.href='/login'}
const sessionData=JSON.parse(session);
const userData=user?JSON.parse(user):{};
document.getElementById('user-name').textContent=userData.name||userData.email||'';

function logout(){localStorage.removeItem('pai_session');localStorage.removeItem('pai_user');window.location.href='/login'}
function getAuthHeaders(){return{'Authorization':'Bearer '+sessionData.access_token,'Content-Type':'application/json'}}

const ranks=[{n:"Beginner",min:0,e:"🌱"},{n:"Apprentice",min:500,e:"🔧"},{n:"Practitioner",min:1200,e:"⚙️"},{n:"Advanced",min:2000,e:"🔥"},{n:"Expert",min:2800,e:"🧠"},{n:"Master",min:3150,e:"👑"}];
function getRank(xp){return[...ranks].reverse().find(r=>xp>=r.min)||ranks[0]}
function getNextRank(xp){return ranks.find(r=>r.min>xp)}

const LN={l1:"Your First Real Conversation",l2:"The Anatomy of a Perfect Prompt",l3:"Iterating Like a Pro",l4:"Project: Client Report",l5:"Project: Competitive Research",l6:"Project: Automate Reporting",l7:"Project: Inbox Triage",l8:"Project: Sprint Planning",l9:"Project: Browser Automation",l10:"Chain-of-Thought Prompting",l11:"Project: Build an AI App",l12:"Your Claude OS"};
const MN={m1:"Module 1: Foundations",m2:"Module 2: Power Tools",m3:"Module 3: Connected Ecosystem",m4:"Module 4: Expert Techniques"};
const LM={l1:"m1",l2:"m1",l3:"m1",l4:"m2",l5:"m2",l6:"m2",l7:"m3",l8:"m3",l9:"m3",l10:"m4",l11:"m4",l12:"m4"};
const ALL_L=['l1','l2','l3','l4','l5','l6','l7','l8','l9','l10','l11','l12'];

async function loadDashboard(){
  try{
    const r=await fetch('/api/dashboard/student',{headers:getAuthHeaders()});
    if(r.status===401){logout();return}
    const d=await r.json();
    if(d.error){document.getElementById('main-content').innerHTML='<div class="empty-state"><h3>'+d.error+'</h3></div>';return}
    const isSuper=d.profile&&['supervisor','admin'].includes(d.profile.role);
    renderStudent(d,isSuper);
  }catch(e){document.getElementById('main-content').innerHTML='<div class="empty-state"><h3>Unable to load dashboard</h3><p>'+e.message+'</p></div>'}
}

function renderStudent(data,isSuper){
  const{profile,stats,lessons}=data;
  const c=document.getElementById('main-content');
  const rank=getRank(profile.xp);
  const next=getNextRank(profile.xp);
  const xpPct=next?Math.round(((profile.xp-rank.min)/(next.min-rank.min))*100):100;

  const dots=ALL_L.map(lid=>{
    const ls=lessons[lid];
    if(ls&&ls.best_score>=70)return'<div class="progress-dot completed" title="'+LN[lid]+': '+ls.best_score+'/100">'+ls.best_score+'</div>';
    if(ls)return'<div class="progress-dot active" title="'+LN[lid]+': '+ls.best_score+'/100">'+ls.best_score+'</div>';
    return'<div class="progress-dot empty" title="'+LN[lid]+': Not started">—</div>';
  }).join('');

  const cards=Object.entries(lessons).sort((a,b)=>ALL_L.indexOf(a[0])-ALL_L.indexOf(b[0])).map(([lid,ls])=>{
    const sc=ls.best_score>=80?'high':ls.best_score>=60?'mid':'low';
    const imp=ls.best_score>ls.first_score&&ls.attempts>1;
    const ch=imp?'<span class="score-change up">↑ +'+( ls.best_score-ls.first_score)+' from first attempt</span>':'';
    const mod=LM[lid]||ls.module_id;
    return'<div class="lesson-card"><div class="lesson-card-header"><div><div style="font-size:11px;color:#888;margin-bottom:2px">'+(MN[mod]||mod)+'</div><div class="lesson-card-title">'+(LN[lid]||lid)+'</div></div><div style="text-align:right"><div class="lesson-card-score '+sc+'">'+ls.best_score+ch+'</div><div style="font-size:11px;color:#666">best score</div></div></div><div class="lesson-card-meta"><span>📝 '+ls.attempts+' attempt'+(ls.attempts>1?'s':'')+'</span><span>📅 First: '+new Date(ls.first_graded_at).toLocaleDateString()+'</span><span>📅 Latest: '+new Date(ls.latest_graded_at).toLocaleDateString()+'</span>'+(imp?'<span style="color:#22c55e">📈 Improved!</span>':'')+'</div>'+(ls.best_feedback?'<div class="lesson-card-feedback">'+ls.best_feedback+'</div>':'')+'</div>';
  }).join('');

  c.innerHTML=(isSuper?'<div class="tab-bar"><button class="btn-tab active" onclick="loadDashboard()">📊 My Progress</button><button class="btn-tab" onclick="loadTeam()">👥 Team Dashboard</button></div>':'')+
  '<div style="margin-bottom:24px"><div class="rank-display"><span class="rank-emoji">'+rank.e+'</span><div><div class="rank-name">'+rank.n+'</div><div class="rank-sub">'+profile.name+' · '+profile.xp+' XP'+(next?' · Next: '+next.e+' '+next.n+' at '+next.min+' XP':' · MAX RANK')+'</div></div></div><div class="xp-bar"><div class="xp-fill" style="width:'+xpPct+'%"></div></div><div class="xp-label">'+profile.xp+' / '+(next?next.min:profile.xp)+' XP</div></div>'+
  '<div class="section"><div class="section-header"><h2>Lesson Progress</h2></div><div class="progress-overview">'+dots+'</div></div>'+
  '<div class="stats-grid"><div class="stat-card"><div class="label">Lessons Graded</div><div class="value">'+stats.lessons_graded+'</div><div class="sub">of 12 total</div></div><div class="stat-card"><div class="label">Best Score Avg</div><div class="value">'+stats.avg_best_score+'</div><div class="sub">across graded lessons</div></div><div class="stat-card"><div class="label">Improvement</div><div class="value">'+(stats.improvement>=0?'+':'')+stats.improvement+'</div><div class="sub">'+(stats.improvement>0?'<span class="improvement">first → best avg</span>':'first vs best')+'</div></div><div class="stat-card"><div class="label">Total Attempts</div><div class="value">'+stats.total_attempts+'</div><div class="sub">'+stats.lessons_graded+' lesson'+(stats.lessons_graded!==1?'s':'')+' attempted</div></div><div class="stat-card"><div class="label">Completion</div><div class="value">'+stats.completion_pct+'%</div><div class="sub">'+stats.completed_lessons+' of 12 completed</div></div><div class="stat-card"><div class="label">Time Invested</div><div class="value">'+(stats.total_time_minutes>=60?Math.floor(stats.total_time_minutes/60)+'h':stats.total_time_minutes+'m')+'</div><div class="sub">total training time</div></div></div>'+
  '<div class="section"><div class="section-header"><h2>Lesson Details — Score & Feedback</h2></div>'+(cards||'<div class="empty-state"><h3>No lessons graded yet</h3><p>Go to the academy and complete your first lesson!</p></div>')+'</div>'+
  '<div style="margin-top:16px"><button class="btn btn-accent" onclick="window.location.href=\'/academy\'" style="width:100%;padding:14px;font-size:15px;font-weight:700">Continue Training →</button></div>';
}

async function loadTeam(){
  const c=document.getElementById('main-content');
  c.innerHTML='<div class="loading">Loading team data...</div>';
  try{
    const r=await fetch('/api/dashboard/team',{headers:getAuthHeaders()});
    if(r.status===403){c.innerHTML='<div class="empty-state"><h3>Supervisor access required</h3></div>';return}
    const d=await r.json();
    renderTeam(d);
  }catch(e){c.innerHTML='<div class="empty-state"><h3>Error loading team data</h3></div>'}
}

function renderTeam(data){
  const{members,stats}=data;
  const c=document.getElementById('main-content');
  const sorted=[...(members||[])].sort((a,b)=>b.avg_score-a.avg_score||b.completion_pct-a.completion_pct);
  const rows=sorted.map((m,i)=>{
    const fc=m.completion_pct>=70?'fill-high':m.completion_pct>=30?'fill-mid':'fill-low';
    const hg=(m.lessons_graded||m.grades_count||0)>0;
    const hp=(m.in_progress_lessons||0)>0;
    const sb=m.completion_pct===100?'<span class="badge badge-green">Completed</span>':m.completed_lessons>0?'<span class="badge badge-yellow">In Progress</span>':hg||hp?'<span class="badge badge-yellow">Active</span>':'<span class="badge badge-gray">Not Started</span>';
    const t=m.total_time_minutes>=60?Math.floor(m.total_time_minutes/60)+'h '+(m.total_time_minutes%60)+'m':m.total_time_minutes+'m';
    const att=m.total_attempts||m.grades_count||0;
    const lg=m.lessons_graded||0;
    const la=m.last_active?new Date(m.last_active).toLocaleDateString():'';
    return'<tr><td><span class="leaderboard-rank">#'+(i+1)+'</span></td><td><strong>'+m.name+'</strong></td><td style="color:#888">'+m.email+'</td><td style="min-width:140px"><div style="display:flex;align-items:center;gap:8px"><div class="progress-bar" style="flex:1"><div class="progress-fill '+fc+'" style="width:'+m.completion_pct+'%"></div></div><span style="font-size:12px;color:#aaa;min-width:55px">'+m.completed_lessons+'/'+m.total_lessons+'</span></div></td><td><strong>'+m.avg_score+'</strong>/100'+(lg>0?'<div style="font-size:10px;color:#666">'+lg+' lesson'+(lg>1?'s':'')+' · '+att+' attempt'+(att>1?'s':'')+'</div>':'')+'</td><td>'+t+'</td><td>'+(m.xp||0)+' XP</td><td>'+sb+'<div style="font-size:10px;color:#555;margin-top:2px">'+la+'</div></td></tr>';
  }).join('');

  c.innerHTML='<div class="tab-bar"><button class="btn-tab" onclick="loadDashboard()">📊 My Progress</button><button class="btn-tab active" onclick="loadTeam()">👥 Team Dashboard</button></div>'+
  '<div class="stats-grid"><div class="stat-card"><div class="label">Team Members</div><div class="value">'+(stats.total_members||0)+'</div><div class="sub">'+(stats.fully_completed||0)+' completed all lessons</div></div><div class="stat-card"><div class="label">Active Students</div><div class="value">'+members.filter(m=>(m.lessons_graded||m.grades_count||m.in_progress_lessons||0)>0).length+'</div><div class="sub">have started training</div></div><div class="stat-card"><div class="label">Avg Best Score</div><div class="value">'+(stats.avg_score||0)+'</div><div class="sub">best score per lesson</div></div><div class="stat-card"><div class="label">Total Training Time</div><div class="value">'+(stats.total_time_hours||0)+'h</div><div class="sub">invested by team</div></div></div>'+
  '<div class="section"><div class="section-header"><h2>Team Progress</h2><button class="btn btn-outline" onclick="exportCSV()">📥 Export CSV</button></div><div class="table-wrap"><table><thead><tr><th>Rank</th><th>Name</th><th>Email</th><th>Progress</th><th>Best Score</th><th>Time</th><th>XP</th><th>Status</th></tr></thead><tbody>'+rows+'</tbody></table></div></div>'+
  '<div class="section"><div class="section-header"><h2>Invite Team Members</h2></div><div class="invite-form"><input type="email" id="invite-email" placeholder="colleague@company.com"><button class="btn btn-accent" onclick="inviteMember()">Invite</button><span id="invite-msg"></span></div></div>';
}

async function inviteMember(){
  const email=document.getElementById('invite-email').value;if(!email)return;
  const msg=document.getElementById('invite-msg');
  try{const r=await fetch('/api/dashboard/invite',{method:'POST',headers:getAuthHeaders(),body:JSON.stringify({email})});
  const d=await r.json();msg.style.color=r.ok?'#4ade80':'#f87171';msg.textContent=r.ok?d.message:d.error;
  if(r.ok)document.getElementById('invite-email').value=''}catch(e){msg.style.color='#f87171';msg.textContent='Failed'}
}

async function exportCSV(){
  try{const r=await fetch('/api/dashboard/export',{headers:getAuthHeaders()});if(!r.ok){alert('Export failed');return}
  const b=await r.blob();const u=URL.createObjectURL(b);const a=document.createElement('a');a.href=u;a.download='team-progress.csv';a.click();URL.revokeObjectURL(u)}catch(e){alert('Export failed: '+e.message)}
}
