<!DOCTYPE html>
<html lang="en">
<head>
<script async src="https://www.googletagmanager.com/gtag/js?id=G-3M38SRWE6C"></script>
<script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments)}gtag("js",new Date());gtag("config","G-3M38SRWE6C");</script>
<meta charset="UTF-8">
<meta property="og:title" content="Sign In — Prompt AI Academy">
<meta property="og:description" content="Master Claude in hours, not months. Sign in to continue your AI communication training.">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prompt AI Academy — Sign In</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0a0a0f;color:#e0e0e0;min-height:100vh;display:flex;align-items:center;justify-content:center}
[data-theme="light"]{background:#f5f7fa!important;color:#111827!important}
[data-theme="light"] .logo h1{background:linear-gradient(135deg,#2563eb,#1d4ed8,#059669);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
[data-theme="light"] .logo p{color:#6b7280}
[data-theme="light"] .auth-card{background:#ffffff;border-color:#d1d5de}
[data-theme="light"] .tab{color:#6b7280;border-bottom-color:#d1d5de}
[data-theme="light"] .tab.active{color:#2563eb;border-bottom-color:#2563eb}
[data-theme="light"] .form-group label{color:#374151}
[data-theme="light"] .form-group input{background:#f5f7fa;border-color:#d1d5de;color:#111827}
[data-theme="light"] .form-group input:focus{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,0.1)}
[data-theme="light"] .btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
[data-theme="light"] .optional-tag{color:#9ca3af}
[data-theme="light"] .divider{color:#9ca3af}
[data-theme="light"] .divider::before,[data-theme="light"] .divider::after{background:#d1d5de}
[data-theme="light"] .guest-link a{color:#2563eb}
[data-theme="light"] .error{background:rgba(220,38,38,0.08);border-color:rgba(220,38,38,0.2);color:#dc2626}
[data-theme="light"] .success{background:rgba(5,150,105,0.08);border-color:rgba(5,150,105,0.2);color:#059669}
[data-theme="light"] #welcome-back h3{color:#111827}
[data-theme="light"] #welcome-back p{color:#6b7280}
.auth-container{width:100%;max-width:420px;padding:20px}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:28px;background:linear-gradient(135deg,#6366f1,#8b5cf6,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
.logo p{color:#888;font-size:14px}
.auth-card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:32px;backdrop-filter:blur(10px)}
.tabs{display:flex;margin-bottom:24px;border-bottom:1px solid rgba(255,255,255,0.1)}
.tab{flex:1;padding:12px;text-align:center;cursor:pointer;color:#888;font-weight:500;border-bottom:2px solid transparent;transition:all 0.2s}
.tab.active{color:#a78bfa;border-bottom-color:#a78bfa}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:#aaa;margin-bottom:6px;font-weight:500}
.form-group input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#fff;font-size:15px;transition:border-color 0.2s}
.form-group input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,0.15)}
.form-group input::placeholder{color:#555}
.btn-primary{width:100%;padding:14px;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:transform 0.1s,opacity 0.2s;margin-top:8px}
.btn-primary:hover{opacity:0.9;transform:translateY(-1px)}
.btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.error-msg{background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#f87171;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.success-msg{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.3);color:#4ade80;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none}
.divider{text-align:center;color:#555;font-size:13px;margin:20px 0;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:rgba(255,255,255,0.1)}
.divider::before{left:0}
.divider::after{right:0}
.guest-link{text-align:center;margin-top:16px}
.guest-link a{color:#8b5cf6;text-decoration:none;font-size:14px}
.guest-link a:hover{text-decoration:underline}
#register-form{display:none}
.optional-tag{color:#666;font-size:11px;font-weight:400}
</style>
</head>
<body>
<script>document.body.setAttribute('data-theme',localStorage.getItem('pai_theme')||'light');</script>
<div class="auth-container">
  <div class="logo">
    <h1>🎓 Prompt AI Academy</h1>
    <p>Master Claude in Hours, Not Months</p>
  </div>
  <div class="auth-card">
    <div class="tabs">
      <div class="tab active" onclick="showTab('login')">Sign In</div>
      <div class="tab" onclick="showTab('register')">Create Account</div>
    </div>

    <div id="error" class="error-msg"></div>
    <div id="success" class="success-msg"></div>

    <!-- LOGIN FORM -->
    <form id="login-form" onsubmit="handleLogin(event)">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="login-password" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Sign In</button>
      <div style="text-align:center;margin-top:12px"><a href="#" onclick="forgotPassword(event)" style="color:#888;font-size:13px;text-decoration:none">Forgot Password?</a></div>
    </form>

    <!-- REGISTER FORM -->
    <form id="register-form" onsubmit="handleRegister(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="reg-name" placeholder="Arnold Phipps" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@company.com" required>
      </div>
      <div class="form-group">
        <label>Password <span class="optional-tag">(min 6 characters)</span></label>
        <input type="password" id="reg-password" placeholder="••••••••" minlength="6" required>
      </div>
      <div class="form-group">
        <label>Company <span class="optional-tag">(optional)</span></label>
        <input type="text" id="reg-company" placeholder="Acme Corp">
      </div>
      <button type="submit" class="btn-primary" id="reg-btn">Create Account</button>
    </form>

    <div class="divider">or</div>
    <div class="guest-link">
      <a href="/academy">Continue as Guest →</a>
    </div>

    <!-- WELCOME BACK (shown when already logged in) -->
    <div id="welcome-back" style="display:none;text-align:center;padding:20px 0">
      <div style="font-size:36px;margin-bottom:12px">👋</div>
      <h3 style="font-size:18px;margin-bottom:4px">Welcome back!</h3>
      <p id="wb-name" style="color:#888;margin-bottom:20px"></p>
      <button class="btn-primary" onclick="window.location.href='/academy'" style="width:100%;margin-bottom:12px">Continue as <span id="wb-name2"></span> →</button>
      <button onclick="switchUser()" style="width:100%;padding:12px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:#aaa;border-radius:8px;font-size:14px;cursor:pointer">Sign in as a different user</button>
    </div>
  </div>
</div>

<script>
// Check if already logged in — validate session first
const session = localStorage.getItem('pai_session');
const existingUser = localStorage.getItem('pai_user');
if (session) {
  try {
    const s = JSON.parse(session);
    if (s.access_token) {
      // Validate the session is still good
      fetch('/api/auth/me', {headers:{'Authorization':'Bearer '+s.access_token}})
        .then(r => {
          if (r.ok) {
            // Session valid — show welcome back
            const name = existingUser ? JSON.parse(existingUser).name || JSON.parse(existingUser).email : 'your account';
            document.getElementById('login-form').style.display = 'none';
            document.getElementById('register-form').style.display = 'none';
            document.querySelector('.divider').style.display = 'none';
            document.querySelector('.guest-link').style.display = 'none';
            document.querySelector('.tabs').style.display = 'none';
            document.getElementById('welcome-back').style.display = 'block';
            document.getElementById('wb-name').textContent = name;
            document.getElementById('wb-name2').textContent = name;
          } else {
            // Session expired — clear it and show login form
            localStorage.removeItem('pai_session');
            localStorage.removeItem('pai_user');
          }
        })
        .catch(() => {
          localStorage.removeItem('pai_session');
          localStorage.removeItem('pai_user');
        });
    }
  } catch(e) { localStorage.removeItem('pai_session'); }
}

function switchUser() {
  localStorage.removeItem('pai_session');
  localStorage.removeItem('pai_user');
  document.getElementById('welcome-back').style.display = 'none';
  document.getElementById('login-form').style.display = 'block';
  document.querySelector('.divider').style.display = 'block';
  document.querySelector('.guest-link').style.display = 'block';
  document.querySelector('.tabs').style.display = 'flex';
  document.querySelectorAll('.tab')[0].classList.add('active');
  // Clear fields so Chrome autofill doesn't confuse different users
  setTimeout(() => {
    document.getElementById('login-email').value = '';
    document.getElementById('login-password').value = '';
    document.getElementById('login-email').focus();
  }, 100);
}

async function forgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('login-email').value;
  if (!email) { 
    document.getElementById('error').textContent = 'Enter your email address first, then click Forgot Password.';
    document.getElementById('error').style.display = 'block';
    document.getElementById('login-email').focus();
    return; 
  }
  try {
    const res = await fetch('/api/auth/reset-password', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    const data = await res.json();
    document.getElementById('error').style.display = 'none';
    document.getElementById('success').textContent = 'If that email exists, a password reset link has been sent. Check your inbox.';
    document.getElementById('success').style.display = 'block';
  } catch (err) {
    document.getElementById('error').textContent = 'Unable to send reset email. Try again.';
    document.getElementById('error').style.display = 'block';
  }
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('error').style.display = 'none';
  document.getElementById('success').style.display = 'none';
  if (tab === 'login') {
    document.getElementById('login-form').style.display = 'block';
    document.getElementById('register-form').style.display = 'none';
    document.querySelectorAll('.tab')[0].classList.add('active');
  } else {
    document.getElementById('login-form').style.display = 'none';
    document.getElementById('register-form').style.display = 'block';
    document.querySelectorAll('.tab')[1].classList.add('active');
  }
}

function showError(msg) {
  const el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('success').style.display = 'none';
}

function showSuccess(msg) {
  const el = document.getElementById('success');
  el.textContent = msg;
  el.style.display = 'block';
  document.getElementById('error').style.display = 'none';
}

async function handleLogin(e) {
  e.preventDefault();
  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        email: document.getElementById('login-email').value,
        password: document.getElementById('login-password').value
      })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); btn.disabled = false; btn.textContent = 'Sign In'; return; }
    localStorage.setItem('pai_session', JSON.stringify(data.session));
    localStorage.setItem('pai_user', JSON.stringify(data.user));
    window.location.href = '/academy';
  } catch (err) {
    showError('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Sign In';
  }
}

async function handleRegister(e) {
  e.preventDefault();
  const btn = document.getElementById('reg-btn');
  btn.disabled = true;
  btn.textContent = 'Creating account...';
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: document.getElementById('reg-name').value,
        email: document.getElementById('reg-email').value,
        password: document.getElementById('reg-password').value,
        company: document.getElementById('reg-company').value || null
      })
    });
    const data = await res.json();
    if (!res.ok) { showError(data.error); btn.disabled = false; btn.textContent = 'Create Account'; return; }
    if (data.session) {
      localStorage.setItem('pai_session', JSON.stringify(data.session));
      localStorage.setItem('pai_user', JSON.stringify(data.user));
      window.location.href = '/academy';
    } else {
      showSuccess('Account created! Check your email to verify, then sign in.');
      showTab('login');
    }
  } catch (err) {
    showError('Connection error. Please try again.');
    btn.disabled = false;
    btn.textContent = 'Create Account';
  }
}
</script>
</body>
</html>
